<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📊 美股投資分析報告</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:40px 24px}
.container{max-width:800px;margin:0 auto}
h1{font-size:28px;font-weight:700;margin-bottom:8px}
h1 span{color:#3b82f6}
.subtitle{color:#64748b;font-size:14px;margin-bottom:40px}
.report-list{list-style:none}
.report-item{background:#111827;border:1px solid #1e2d45;border-radius:12px;padding:18px 24px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;transition:border-color .2s}
.report-item:hover{border-color:#3b82f6}
.report-date{font-size:16px;font-weight:600}
.report-badge{font-size:11px;background:#1d3461;color:#60a5fa;padding:3px 10px;border-radius:10px}
a{color:inherit;text-decoration:none}
.open-btn{background:#3b82f6;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.empty{color:#64748b;text-align:center;padding:60px;font-size:14px}
.footer{margin-top:48px;font-size:12px;color:#475569;text-align:center;border-top:1px solid #1e2d45;padding-top:20px}
</style>
</head>
<body>
<div class="container">
  <h1>📊 <span>美股</span>投資分析報告</h1>
  <div class="subtitle">每週四、週六早上 8:00 自動更新 · 資料僅供參考，不構成投資建議</div>
  <div id="report-list"></div>
  <div class="footer">⚠️ 本頁所有報告僅供參考，不構成任何投資建議。投資有風險，請自行判斷。</div>
</div>
<script>
const reports = REPORTS_JSON;
const container = document.getElementById('report-list');
if (!reports.length) {
  container.innerHTML = '<div class="empty">尚無報告，請稍後再來</div>';
} else {
  const ul = document.createElement('ul');
  ul.className = 'report-list';
  reports.forEach(r => {
    const li = document.createElement('li');
    li.className = 'report-item';
    li.innerHTML = `<div><div class="report-date">📄 ${r.date} 投資報告</div></div><a href="${r.url}"><button class="open-btn">開啟報告 →</button></a>`;
    ul.appendChild(li);
  });
  container.appendChild(ul);
}
</script>
</body>
</html>
