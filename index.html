<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📊 美股投資分析報告</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:40px 24px}
.container{max-width:780px;margin:0 auto}
h1{font-size:26px;font-weight:700;margin-bottom:6px}
h1 span{color:#3b82f6}
.subtitle{color:#64748b;font-size:13px;margin-bottom:36px}
.report-item{background:#111827;border:1px solid #1e2d45;border-radius:12px;padding:16px 22px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;transition:border-color .15s}
.report-item:hover{border-color:#3b82f6}
.report-date{font-size:15px;font-weight:600}
.report-sub{font-size:11px;color:#64748b;margin-top:3px}
.open-btn{background:#3b82f6;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block}
.loading{color:#64748b;text-align:center;padding:60px;font-size:14px}
.footer{margin-top:48px;font-size:11px;color:#475569;text-align:center;border-top:1px solid #1e2d45;padding-top:20px;line-height:1.7}
.badge{font-size:10px;background:#1d3461;color:#60a5fa;padding:2px 8px;border-radius:8px;margin-left:8px}
</style>
</head>
<body>
<div class="container">
  <h1>📊 <span>美股</span>投資分析報告</h1>
  <div class="subtitle">每週四、週六早上 8:00 自動更新 · 共 <span id="count">—</span> 份報告</div>
  <div id="list"><div class="loading">載入報告清單中...</div></div>
  <div class="footer">
    ⚠️ 免責聲明：本頁所有報告僅供參考，不構成任何投資建議。<br>
    股市投資具有風險，過去績效不代表未來表現，請自行判斷並諮詢專業顧問。<br>
    資料來源：Yahoo Finance、MarketBeat、分析師公開預測
  </div>
</div>
<script>
(async () => {
  const REPO = "yuming0827/us-stock-reports";
  const BASE = "https://yuming0827.github.io/us-stock-reports";
  const container = document.getElementById("list");
  try {
    const res = await fetch("https://api.github.com/repos/" + REPO + "/contents/");
    const files = await res.json();
    const reports = files
      .filter(f => f.name.startsWith("投資報告_") && f.name.endsWith(".html"))
      .sort((a,b) => b.name.localeCompare(a.name));
    document.getElementById("count").textContent = reports.length;
    if (!reports.length) {
      container.innerHTML = '<div class="loading">尚無報告，下次排程執行後即可看到</div>';
      return;
    }
    container.innerHTML = reports.map(f => {
      const date = f.name.replace("投資報告_","").replace(".html","");
      const [y,m,d] = date.split("-");
      const weekday = ["日","一","二","三","四","五","六"][new Date(date).getDay()];
      return '<div class="report-item"><div><div class="report-date">📄 ' + y + ' 年 ' + m + ' 月 ' + d + ' 日 <span class="badge">週' + weekday + '</span></div><div class="report-sub">美股精選分析 · 7個互動分頁</div></div><a class="open-btn" href="' + BASE + '/' + f.name + '" target="_blank">開啟報告 →</a></div>';
    }).join("");
  } catch(e) {
    container.innerHTML = '<div class="loading">載入失敗，請重新整理</div>';
  }
})();
</script>
</body>
</html>
